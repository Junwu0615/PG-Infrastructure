# helm/app-stack/templates/python-app-deploy.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
      - name: python-worker
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["python", "app.py"]

        envFrom: # ConfigMap 裡的所有 Data 直接變成環境變數
          - configMapRef:
              name: app-config

        env: # 手動一對一指定
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: DB_PASSWORD
---
apiVersion: v1
kind: ConfigMap # 如果它只是個 Worker（只會主動去抓資料，沒人會連它），那它不需要 Service
metadata:
  name: app-config
data:
  DB_HOST: "postgres-service"
  DB_NAME: "myapp"