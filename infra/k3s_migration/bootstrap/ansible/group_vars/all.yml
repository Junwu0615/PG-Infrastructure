# ansible/group_vars/all.yml

---
# K3s 版本與安裝參數
k3s_version: "v1.29.3+k3s1"

# 定義 K3s 相關路徑
k3s_bin_dir: "/usr/local/bin/k3s"
k3s_conf_dir: "/etc/rancher/k3s/k3s.yaml"
k3s_node_token: "/var/lib/rancher/k3s/server/node-token"

# 網路設定
k3s_api_port: "6443"

# Keepalived VIP 位置
k3s_vip: "10.88.0.99"
k3s_vip_cidr: "24"
keepalived_auth_pass: "k3s_ha_secret"


