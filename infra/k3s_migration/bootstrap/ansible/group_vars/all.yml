# ============================================================================
# 動態推導 Keepalived 拓撲 （ 拒絕硬編碼 IP ）
# ============================================================================
# 1. 動態生成節點角色與權重
# 規則：k3s_primary[0] 強制鎖定為 MASTER (Priority: 150)，其餘 secondary 依序遞減權重
keepalived_nodes: >
  {% set nodes = {} %}
  {% for host in groups['k3s_servers'] %}
    {% if host in groups['k3s_primary'] %}
      {% re = nodes.update({ host: {'state': 'MASTER', 'priority': 150} }) %}
    {% else %}
      {# 其餘次要節點權重依序遞減，確保競選順序：120, 110, 100... #}
      {% set priority = 130 - (loop.index * 10) %}
      {% re = nodes.update({ host: {'state': 'BACKUP', 'priority': priority} }) %}
    {% endif %}
  {% endfor %}
  {{ nodes }}

# 2. 動態生成 Peer 對等體清單
# 規則：每台機器的 Peer，就是「除了自己以外」的其他所有 k3s_servers IP
keepalived_peers: >
  {% set peers_map = {} %}
  {% for host in groups['k3s_servers'] %}
    {% set current_host = host %}
    {% set peers_list = [] %}
    {% for peer in groups['k3s_servers'] %}
      {% if peer != current_host %}
        {% append = peers_list.append(peer) %}
      {% endif %}
    {% endfor %}
    {% re = peers_map.update({ current_host: peers_list }) %}
  {% endfor %}
  {{ peers_map }}


# 註冊 host 變數清單
ingress_path: "{{ groups['k3s_agents'][0] | default('10.88.0.20') }}"
docker_registry_host: "docker-registry.k8s.local"


# NFS 持久化設置
container_uid: "1001"
k3s_subnet_path: "10.88.0.0/24"
nfs_sqlite_ver: "test-sqlite"
#nfs_sqlite_ver: "stage-sqlite"
#nfs_sqlite_ver: "prod-sqlite"
nfs_export_dir: "/data/nfs/{{ nfs_sqlite_ver }}"