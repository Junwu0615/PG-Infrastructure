# ansible/group_vars/all.yml

---
# K3s 版本與安裝參數
k3s_version: "v1.29.3+k3s1"

# 定義 K3s 相關路徑
k3s_bin_dir: "/usr/local/bin/k3s"
k3s_conf_dir: "/etc/rancher/k3s/k3s.yaml"
k3s_node_token: "/var/lib/rancher/k3s/server/node-token"

# 網路設定
k3s_api_port: "6443"

# Keepalived VIP 位置
k3s_vip: "10.88.0.99"
k3s_vip_cidr: "24"
keepalived_auth_pass: "k3s_ha_secret"

# 初始化 VIP 預先選定
keepalived_nodes:
  10.88.0.10:
    state: MASTER
    priority: 150

  10.88.0.11:
    state: BACKUP
    priority: 120

  10.88.0.12:
    state: BACKUP
    priority: 100


keepalived_peers:
  "10.88.0.10":
    - "10.88.0.11"
    - "10.88.0.12"

  "10.88.0.11":
    - "10.88.0.10"
    - "10.88.0.12"

  "10.88.0.12":
    - "10.88.0.10"
    - "10.88.0.11"


# 註冊 host 變數清單
ingress_path: "10.88.0.20"
docker_registry_host: "docker-registry.k8s.local"

# NFS 持久化設置
container_uid: "1001"
k3s_subnet_path: "10.88.0.0/24"
nfs_sqlite_ver: "test-sqlite"
#nfs_sqlite_ver: "stage-sqlite"
#nfs_sqlite_ver: "prod-sqlite"
nfs_export_dir: "/data/nfs/{{ nfs_sqlite_ver }}"