# ansible/playbooks/gateway.yml
---

- name: Setup Gateway Reverse Proxy
  hosts: gateway
  become: yes
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
      tags: [ install, gateway ]


    - name: Enable nginx
      systemd:
        name: nginx
        enabled: yes
        state: started
      tags: [ install, gateway ]


    - name: Configure portainer reverse proxy
      copy:
        dest: /etc/nginx/conf.d/portainer.conf
        content: |
          server {
              listen 80;
              server_name portainer.local;

              location / {
                  proxy_pass http://{{ groups['agents'][0] }}:9000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
      tags: [ install, gateway ]


    - name: Restart nginx
      systemd:
        name: nginx
        state: restarted
      tags: [ install, gateway ]