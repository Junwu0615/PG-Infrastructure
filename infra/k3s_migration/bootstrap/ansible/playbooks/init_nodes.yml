# ansible/playbooks/init_nodes.yml

---
- name: Prepare Nodes
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Gather service facts
      # 收集 systemd 服務 供後續判斷
      ansible.builtin.service_facts:

    - name: Disable Swap in fstab
      mount:
        name: "{{ item }}"
        fstype: swap
        state: absent
      loop: [ "none", "swap" ]

    - name: Enable Kernel Modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay

    - name: Ensure modules load on boot
      copy:
        content: |
          br_netfilter
          overlay
        dest: /etc/modules-load.d/k8s.conf

    - name: Enable IPv4 Forwarding
      sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
      loop:
        - net.ipv4.ip_forward
        - net.bridge.bridge-nf-call-iptables

    - name: Install NFS client for Debian/Ubuntu
      apt:
        name: nfs-common
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
      tags:
        - storage

    - name: Install NFS client for RedHat/CentOS/Rocky
      dnf:
        name: nfs-utils
        state: present
      when: ansible_os_family == "RedHat"
      tags:
        - storage

    - name: Ensure rancher directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"
      tags:
        - registry

    - name: Add registry host
      lineinfile:
        path: /etc/hosts
        regexp: '.*docker-registry\.k8s\.local.*'
        line: "{{ ingress_path }} {{ registry_host }}"
        state: present
      tags:
        - registry

    - name: Create registries.yaml
      template:
        src: registries.yml.j2
        dest: /etc/rancher/k3s/registries.yaml
        owner: root
        group: root
        mode: "0644"
      tags:
        - registry
      notify:
        - Restart K3s Master
        - Restart K3s Agent

  handlers:
    - name: Restart K3s Master
      systemd:
        name: k3s
        state: restarted
      when:
        - inventory_hostname in groups['masters']
        # 檢查 systemd 服務檔案是否存在，不存在就跳過
        - ansible_facts.services['k3s.service'] is defined

    - name: Restart K3s Agent
      systemd:
        name: k3s-agent
        state: restarted
      when:
        - inventory_hostname in groups['agents']
        # 檢查 systemd 服務檔案是否存在，不存在就跳過
        - ansible_facts.services['k3s-agent.service'] is defined