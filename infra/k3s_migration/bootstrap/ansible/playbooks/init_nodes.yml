# ansible/playbooks/init_nodes.yml

---
- name: Prepare Nodes
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Gather service facts
      # 收集 systemd 服務 供後續判斷
      ansible.builtin.service_facts:

    # 物理抹殺 Swap ( fstab )
    - name: Disable Swap in fstab
      mount:
        name: "{{ item }}"
        fstype: swap
        state: absent
      loop: [ "none", "swap" ]
      tags: [ install ]

    # 物理抹殺 Swap ( 記憶體 )
    - name: Disable Swap in current memory (Immediate)
      command: swapoff -a
      changed_when: false # 避免每次都回報 changed
      tags: [ install ]

    - name: Enable Kernel Modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay
      tags: [ install ]

    - name: Ensure modules load on boot
      copy:
        content: |
          br_netfilter
          overlay
        dest: /etc/modules-load.d/k8s.conf
      tags: [ install ]

    - name: Enable IPv4 Forwarding
      sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        # 確保 sysctl 變更重開機不丟失
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf # 強制寫入獨立設定檔
        reload: yes
      loop:
        - net.ipv4.ip_forward
        - net.bridge.bridge-nf-call-iptables
      tags: [ install ]

    - name: Install NFS client for Debian/Ubuntu
      apt:
        name: nfs-common
        state: present
        update_cache: yes
        cache_valid_time: 3600 # 1小時內不重複 update
      when: ansible_os_family == "Debian"
      tags: [ install, storage ]

    - name: Install NFS client for RedHat/CentOS/Rocky
      dnf:
        name: nfs-utils
        state: present
      when: ansible_os_family == "RedHat"
      tags: [ install, storage ]

    - name: Ensure rancher directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"
      tags: [ install, registry ]

    - name: Add registry host
      lineinfile:
        path: /etc/hosts
        regexp: '.*docker-registry\.k8s\.local.*'
        line: "{{ ingress_path }} {{ registry_host }}"
        state: present
      tags: [ install, registry ]

    - name: Create registries.yaml
      template:
        src: registries.yml.j2
        dest: /etc/rancher/k3s/registries.yaml
        owner: root
        group: root
        mode: "0644"
      tags: [ install, registry ]
      notify:
        - Restart K3s Master
        - Restart K3s Agent

  handlers:
    - name: Restart K3s Master
      systemd:
        name: k3s
        state: restarted
      when:
        - inventory_hostname in groups['masters']
        # 檢查 systemd 服務檔案是否存在，不存在就跳過
        - ansible_facts.services['k3s.service'] is defined
        - ansible_facts.services['k3s.service'].state == 'running'

    - name: Restart K3s Agent
      systemd:
        name: k3s-agent
        state: restarted
      when:
        - inventory_hostname in groups['agents']
        # 檢查 systemd 服務檔案是否存在，不存在就跳過
        - ansible_facts.services['k3s-agent.service'] is defined
        - ansible_facts.services['k3s.service'].state == 'running'