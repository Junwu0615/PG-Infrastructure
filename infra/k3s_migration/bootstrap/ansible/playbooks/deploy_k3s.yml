# ansible/playbooks/deploy_k3s.yml

---
- name: Install or Update K3s Server
  hosts: masters
  become: yes
  tasks:
    - name: Check if K3s is already installed
      stat:
        path: "{{ k3s_bin_dir | default('/usr/local/bin/k3s') }}"
      register: k3s_installed
      tags: [ install, update ]

    # 只有 masters[0] 負責初始化
    - name: Initialize K3s Cluster on First Master
      shell: >
        curl -sfL https://get.k3s.io |
        sh -s - server
        --cluster-init
        --disable traefik
        --node-taint CriticalAddonsOnly=true:NoSchedule
      when:
        - not k3s_installed.stat.exists
        - inventory_hostname == groups['masters'][0]
      tags: [ install ]

    # 獲取第一台 Master 的 Token（不論安裝或更新，都要拉最新 Token 驗證）
    - name: Get K3s Token from First Master
      command: cat "{{ k3s_node_token | default('/var/lib/rancher/k3s/server/node-token') }}"
      register: k3s_token
      changed_when: false
      delegate_to: "{{ groups['masters'][0] }}"
      tags: [ install, update ]

    # 初始化時 Master 先執行實體安裝 ( 如果有第 2、3 ... N 台 )
    - name: Install K3s Binary on Additional Masters
      shell: >
        curl -sfL https://get.k3s.io | 
        sh -s - server 
        --disable traefik 
        --node-taint CriticalAddonsOnly=true:NoSchedule
      when:
        - not k3s_installed.stat.exists
        - inventory_hostname != groups['masters'][0]
      tags: [ install ]

    # 配置或熱更新環境變數（不管是初始化還是更新，都由此任務控管，實現無縫併網）
    - name: Configure K3s Service Environment Variables (Masters)
      lineinfile:
        path: /etc/systemd/system/k3s.service.env
        create: yes
        owner: root
        group: root
        mode: '0600'
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^K3S_URL=', line: "K3S_URL=https://{{ groups['masters'][0] }}:{{ k3s_api_port | default(6443) }}" }
        - { regexp: '^K3S_TOKEN=', line: "K3S_TOKEN={{ k3s_token.stdout | trim }}" }
      when: inventory_hostname != groups['masters'][0]
      tags: [ install, update ]
      notify: Reload and Restart K3s Master

  handlers:
    - name: Reload and Restart K3s Master
      systemd:
        name: k3s
        state: restarted
        daemon_reload: yes


- name: Configure and Update K3s Agents
  hosts: agents
  become: yes
  tasks:
    - name: Check if K3s Agent is already installed
      stat:
        path: /etc/systemd/system/k3s-agent.service
      register: agent_installed
      tags: [ install, update ]

    # 抓取 Token 供 Agent 使用
    - name: Get K3s Token for Agents
      command: cat "{{ k3s_node_token | default('/var/lib/rancher/k3s/server/node-token') }}"
      register: k3s_token
      changed_when: false
      delegate_to: "{{ groups['masters'][0] }}"
      tags: [ install, update ]

    # 初始化時 Agent 先執行實體安裝
    - name: Install K3s Agent Binary
      shell: >
        curl -sfL https://get.k3s.io | 
        sh -s - agent
      when: not agent_installed.stat.exists
      tags: [ install ]

    # Agent 節點一律向第一台 Master 註冊加入 ( 配置或熱更新 Agent 的環境變數 )
    - name: Configure K3s Service Environment Variables (Agents)
      lineinfile:
        path: /etc/systemd/system/k3s-agent.service.env
        create: yes
        owner: root
        group: root
        mode: '0600'
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^K3S_URL=', line: "K3S_URL=https://{{ groups['masters'][0] }}:{{ k3s_api_port | default(6443) }}" }
        - { regexp: '^K3S_TOKEN=', line: "K3S_TOKEN={{ k3s_token.stdout | trim }}" }
      tags: [ install, update ]
      notify: Reload and Restart K3s Agent

  handlers:
    - name: Reload and Restart K3s Agent
      systemd:
        name: k3s-agent
        state: restarted
        daemon_reload: yes