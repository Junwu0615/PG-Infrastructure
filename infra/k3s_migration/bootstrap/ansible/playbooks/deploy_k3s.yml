# ============================================================================
# Phase 1. 【 K3s 配置 : 私人 Host 域名資產配置 】
# ============================================================================
- hosts: k3s_cluster
  become: yes
  pre_tasks:
    - name: "執行 deploy_k3s - Phase 1. 【 K3s 配置 : 私人 Host 域名資產配置 】"
      debug:
        msg: "開始執行 roles/registries"
  roles:
    - registries


# ============================================================================
# Phase 2. 【 K3s 配置 : keepalived 】
# ============================================================================
- hosts: k3s_servers
  become: yes
  pre_tasks:
    - name: "執行 deploy_k3s - Phase 2. 【 K3s 配置 : keepalived 】"
      debug:
        msg: "開始執行 roles/keepalived"
  roles:
    - keepalived


