# ansible/playbooks/deploy_k3s.yml

---
- name: Install or Check K3s Server
  hosts: masters
  become: yes
  tasks:
    - name: Check if K3s is already installed
      stat:
        path: "{{ k3s_bin_dir }}"
      register: k3s_installed

    # 1. 只有 masters 群組裡的第一台機器 (index 0) 負責初始化 cluster-init
    - name: Initialize K3s Cluster on First Master
      shell: >
        curl -sfL https://get.k3s.io |
        sh -s - server
        --cluster-init
        --disable traefik
        --node-taint CriticalAddonsOnly=true:NoSchedule
      when:
        - not k3s_installed.stat.exists
        - inventory_hostname == groups['masters'][0]

    # 2. 獲取第一台 Master 的 Token（供後續所有人使用）
    - name: Get K3s Token from First Master
      command: cat "{{ k3s_node_token }}"
      register: k3s_token
      changed_when: false
      delegate_to: "{{ groups['masters'][0] }}"

    # 3. 如果有第 2、3 ... N 台 Master # --server 會寫死固定機台 改用 K3S_URL
    - name: Join Additional Masters to Cluster
      shell: >
        curl -sfL https://get.k3s.io |
        K3S_URL="https://{{ groups['masters'][0] }}:{{ k3s_api_port }}"
        K3S_TOKEN="{{ hostvars[groups['masters'][0]]['k3s_token']['stdout'] }}"
        sh -s - server
        --disable traefik
        --node-taint CriticalAddonsOnly=true:NoSchedule
      when:
        - not k3s_installed.stat.exists
        - inventory_hostname != groups['masters'][0]


- name: Configure K3s Agents
  hosts: agents
  become: yes
  tasks:
    - name: Check if K3s Agent is already installed
      stat:
        path: /etc/systemd/system/k3s-agent.service
      register: agent_installed

    # 4. Agent 節點一律向第一台 Master 註冊加入
    - name: Join Agents to Cluster
      shell: >
        curl -sfL https://get.k3s.io |
        K3S_URL="https://{{ groups['masters'][0] }}:{{ k3s_api_port }}"
        K3S_TOKEN="{{ hostvars[groups['masters'][0]]['k3s_token']['stdout'] }}"
        sh -s - agent
      when: not agent_installed.stat.exists


- name: Setup local kubectl access
  hosts: masters
  become: yes

  # 只需要從第一台健康的 Master 抓一份 kubeconfig 即可
  run_once: true

  tasks:
    - name: Wait for K3s config
      wait_for:
        path: "{{ k3s_conf_dir }}"
        timeout: 60

    - name: Fetch K3s config
      fetch:
        src: "{{ k3s_conf_dir }}"
        dest: "{{ lookup('env', 'HOME') }}/.kube/config-k3s"
        flat: yes

    - name: Fix Kubeconfig IP
      delegate_to: localhost
      become: no
      replace:
        path: "{{ lookup('env', 'HOME') }}/.kube/config-k3s"
        regexp: "server: https://.*:{{ k3s_api_port }}"
        replace: "server: https://{{ groups['masters'][0] }}:{{ k3s_api_port }}"