# roles/nfs-common/tasks/main.yml
---

# ----------------------------------------------------------------------
# 【 基礎建設配置 : NFS-Common 】
# ----------------------------------------------------------------------
# 1. 建立本地離線包持久化快取目錄（ 不刪除，作為第二次執行的比對基準 ）
- name: Ensure local directory for offline NFS Client packages exists
  file:
    path: /var/cache/local_debs/nfs_client
    state: directory
    mode: '0755'
  when: ansible_os_family == "Debian"
  tags: [ install, update, nfs_common ]

# 2. 複製離線包（ copy 自帶冪等性，檔案若存在且沒變就不會重複傳輸 ）
- name: Synchronize offline NFS Client packages to nodes
  copy:
    src: "{{ playbook_dir }}/../../files/nfs_packages/"
    dest: /var/cache/local_debs/nfs_client/
    mode: '0644'
  when: ansible_os_family == "Debian"
  tags: [ install, update, nfs_common ]

# 3. Client 端的 dpkg 流
- name: Install NFS Client via local deb files (Idempotent Bulk Install)
  shell: "dpkg -i /var/cache/local_debs/nfs_client/*.deb || dpkg -i /var/cache/local_debs/nfs_client/*.deb"
  register: dpkg_result
  changed_when: "'Setting up' in dpkg_result.stdout"
  when: ansible_os_family == "Debian"
  tags: [ install, update, nfs_common ]

# 4. 服務激活與維護
- name: Ensure RPC bind services are running and enabled
  systemd:
    name: rpcbind
    state: started
    enabled: yes
  when: ansible_os_family == "Debian"
  tags: [ install, update, nfs_common ]