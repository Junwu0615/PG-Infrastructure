# roles/k3s-primary/tasks/main.yml
---

# ============================================================================
# 擴容情境偵測 ( Day N )
# ============================================================================
- name: Check if K3s Binary Already Exists
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin_check
  tags: [ install, update ]


# ============================================================================
# Clean Wrong Structure ( Day 0 )
# ============================================================================
- name: Remove Wrong K3s Directory
  file:
    path: /usr/local/bin/k3s
    state: absent
  when:
    - not k3s_bin_check.stat.exists
    - ansible_facts is defined
  tags: [ install ]


# ============================================================================
# Binary ( Day N 防禦： 使用 checksum 確保冪等性，非必要絕不無謂覆蓋 )
# ============================================================================
- name: Create Binary Directory
  file:
    path: /usr/local/bin
    state: directory
    mode: "0755"
  tags: [ install, update ]


- name: Install K3s Binary
  copy:
    src: "{{ playbook_dir }}/../../files/k3s_packages/k3s"
    dest: /usr/local/bin/k3s
    owner: root
    group: root
    mode: "0755"
  when:
    - not k3s_bin_check.stat.exists
  tags: [ install ]


# ============================================================================
# Config ( Day N 安全性： 配置變更必須是受控 )
# ============================================================================
- name: Create Config Directory
  file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [ install, update ]


- name: Deploy Config
  copy:
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
    content: |
      cluster-init: true
      disable:
        - traefik
      tls-san:
        - {{ k3s_vip }}
      node-ip: {{ ansible_default_ipv4.address }}
      node-external-ip: {{ ansible_default_ipv4.address }}
      write-kubeconfig-mode: "0644"

  tags: [ install, update ]
#  notify: "{{ 'Restart K3s Primary' if 'update' in ansible_run_tags else [] }}"
  notify: "Restart K3s Primary"


# ============================================================================
# Service
# ============================================================================
- name: Deploy K3s Service
  copy:
    dest: /etc/systemd/system/k3s.service
    mode: "0644"
    content: |
      [Unit]
      Description=Lightweight Kubernetes
      Documentation=https://k3s.io
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=notify

      ExecStartPre=/sbin/modprobe br_netfilter
      ExecStartPre=/sbin/modprobe overlay

      ExecStart=/usr/local/bin/k3s server

      KillMode=process
      Delegate=yes
      LimitNOFILE=1048576
      LimitNPROC=infinity
      LimitCORE=infinity
      TasksMax=infinity
      TimeoutStartSec=0
      Restart=always
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target

  tags: [ install, update ]
#  notify: "{{ 'Restart K3s Primary' if 'update' in ansible_run_tags else [] }}"
  notify: "Restart K3s Primary"


# ============================================================================
# Systemd
# ============================================================================
- name: Reload Systemd
  systemd:
    daemon_reload: yes
  tags: [ install, update ]


- name: Enable K3s
  systemd:
    name: k3s
    enabled: yes
  tags: [ install, update ]


- name: Start K3s
  systemd:
    name: k3s
    state: started
  tags: [ install, update ]


# ============================================================================
# Flush Handlers ( 嚴格控管 Day N 服務重載時機 )
# ============================================================================
- name: Flush K3s Primary Handlers Immediately
  meta: flush_handlers
  tags: [ install, update ]


# ============================================================================
# Wait & Token Fetch ( 不論 Day 0 或 Day N，全時防禦，確保變數繼承安全 )
# ============================================================================
- name: Wait For K3s API Server Local Ready
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ k3s_api_port | int }}"
    state: started
    timeout: 60
    delay: 5
  tags: [ install, update ]


- name: Wait For Token File
  wait_for:
    path: "{{ k3s_node_token }}"
    state: started
    timeout: 60
  tags: [ install, update ]


- name: Read K3s Token
  slurp:
    src: "{{ k3s_node_token }}"
  register: k3s_token_base64
  tags: [ install, update ]


- name: Share Token To Factor
  set_fact:
    shared_k3s_token: "{{ k3s_token_base64.content | b64decode | trim }}"
  tags: [ install, update ]