# roles/k3s-secondary/tasks/main.yml
---

# ============================================================================
# Clean Wrong Structure
# ============================================================================

- name: Remove Wrong K3s Directory
  file:
    path: /usr/local/bin/k3s
    state: absent
  when:
    - ansible_facts is defined

# ============================================================================
# Binary
# ============================================================================

- name: Create Binary Directory
  file:
    path: /usr/local/bin
    state: directory
    mode: "0755"

- name: Install K3s Binary
  copy:
    src: "{{ playbook_dir }}/../../files/k3s_packages/k3s"
    dest: /usr/local/bin/k3s
    owner: root
    group: root
    mode: "0755"

# ============================================================================
# Config
# ============================================================================

- name: Create Config Directory
  file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Config
  copy:
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
    content: |
      server: https://{{ k3s_vip }}:6443
      token: {{ hostvars[groups['k3s_primary'][0]].shared_k3s_token }}

      disable:
        - traefik

      tls-san:
        - {{ k3s_vip }}

      node-ip: {{ ansible_default_ipv4.address }}
      node-external-ip: {{ ansible_default_ipv4.address }}

      write-kubeconfig-mode: "0644"

# ============================================================================
# Service
# ============================================================================

- name: Deploy K3s Service
  copy:
    dest: /etc/systemd/system/k3s.service
    mode: "0644"
    content: |
      [Unit]
      Description=Lightweight Kubernetes
      Documentation=https://k3s.io
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=notify

      ExecStartPre=/sbin/modprobe br_netfilter
      ExecStartPre=/sbin/modprobe overlay

      ExecStart=/usr/local/bin/k3s server

      KillMode=process
      Delegate=yes
      LimitNOFILE=1048576
      LimitNPROC=infinity
      LimitCORE=infinity
      TasksMax=infinity
      TimeoutStartSec=0
      Restart=always
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target

# ============================================================================
# Wait Primary API Ready
# ============================================================================

- name: Wait For Primary API Server Via VIP
  wait_for:
    host: "{{ k3s_vip }}"
    port: 6443
    state: started
    timeout: 180
    delay: 15

# ============================================================================
# Systemd
# ============================================================================

- name: Reload Systemd
  systemd:
    daemon_reload: yes

- name: Enable K3s
  systemd:
    name: k3s
    enabled: yes

- name: Start K3s
  systemd:
    name: k3s
    state: restarted

# ============================================================================
# Wait
# ============================================================================

- name: Wait K3s Process
  shell: pgrep -f k3s-server
  register: k3s_process
  retries: 30
  delay: 5
  until: k3s_process.rc == 0
  changed_when: false