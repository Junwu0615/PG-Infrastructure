# roles/keepalived/tasks/main.yml
---

- name: Allow Unicast VRRP Protocol for Keepalived
  ansible.builtin.iptables:
    chain: INPUT
    protocol: vrrp
    jump: ACCEPT
    comment: "Keepalived Unicast VRRP Traffic"


- name: Optimize ARP Behavior for VIP Binding
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/98-keepalived-vip.conf
    reload: yes
  loop:
    # arp_ignore = 1: 回應 ARP 請求時，目的 IP 必須完全符合接收網卡上配置的實體或虛擬 IP
    - { name: 'net.ipv4.conf.all.arp_ignore', value: '1' }
    - { name: 'net.ipv4.conf.default.arp_ignore', value: '1' }
    # arp_announce = 2: 核心在發送 ARP 宣告時，強迫使用最合適的本地實體 IP，防止交換器 MAC 混淆
    - { name: 'net.ipv4.conf.all.arp_announce', value: '2' }
    - { name: 'net.ipv4.conf.default.arp_announce', value: '2' }

# ============================================================================
# 【 K3s 配置 : 配置 Masters 的 Keepalived 虛擬 IP (VIP) 】
# ============================================================================
- name: Check if Keepalived is installed
  command: which keepalived
  register: keepalived_check
  failed_when: false
  changed_when: false


- name: Validate keepalived node definition
  assert:
    that:
      - inventory_hostname in keepalived_nodes
    fail_msg: |
      Missing keepalived_nodes definition:
      {{ inventory_hostname }}
      Please update:
      group_vars/all.yml


# ============================================================================
# Offline Install
# ============================================================================
- name: Create package directory
  file:
    path: /tmp/keepalived_packages
    state: directory
    mode: "0755"
  when: keepalived_check.rc != 0


- name: Copy offline packages
  copy:
    src: "{{ playbook_dir }}/../../files/keepalived_packages/"
    dest: /tmp/keepalived_packages/
  when: keepalived_check.rc != 0


- name: Install keepalived packages
  shell: dpkg -i /tmp/keepalived_packages/*.deb
  when: keepalived_check.rc != 0


- name: Cleanup package directory
  file:
    path: /tmp/keepalived_packages
    state: absent
  when: keepalived_check.rc != 0


# ============================================================================
# Configuration
# ============================================================================
- name: Deploy keepalived config
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Keepalived


# ============================================================================
# Start Service
# ============================================================================
- name: Flush handlers immediately
  meta: flush_handlers


- name: Enable Keepalived
  ansible.builtin.systemd:
    name: keepalived
    enabled: yes


- name: Ensure Keepalived Is Running
  ansible.builtin.systemd:
    name: keepalived
    state: started