# ----------------------------------------------------------------------
# 5. 印出最終叢集狀態摘要
# ----------------------------------------------------------------------
- name: Print Final Production Cluster Summary Dashboard
  debug:
    msg:
      - "=========================================================="
      - "  🌟 K3s FULL TOPOLOGY PRODUCTION CLUSTER VALIDATION OK 🌟"
      - "=========================================================="
      - "  Total Registered Nodes : {{ expected_nodes_count }} / {{ expected_nodes_count }} Ready"
      - "  Cluster VIP Entrance   : https://{{ k3s_vip }}:{{ k3s_api_port }}"
      - "  Control Plane Cluster  : {{ groups['k3s_servers'] | length }} Servers Active"
      - "  Worker Compute Engine  : {{ groups['k3s_agents'] | length }} Agents Attached"
      - "=========================================================="
  run_once: true
  delegate_to: "{{ groups['k3s_primary'][0] }}"
  tags: [ install, update, validation ]