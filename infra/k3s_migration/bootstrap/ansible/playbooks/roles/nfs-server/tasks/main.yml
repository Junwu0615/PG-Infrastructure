# roles/nfs-server/tasks/main.yml
---

# ----------------------------------------------------------------------
# 【 基礎建設配置 : NFS-Server 】
# ----------------------------------------------------------------------
- name: Gather service facts
  # 收集 systemd 服務 供後續判斷
  ansible.builtin.service_facts:
  tags: [ install, nfs_server ]


# 檢查服務端是否已安裝
- name: Check if nfs-kernel-server is already installed
  command: dpkg-query -W -f='${Status}' nfs-kernel-server
  register: nfs_server_check
  failed_when: false
  changed_when: false
  tags: [ install, nfs_server ]


# 如未安裝，則走純地端資產分發與硬核安裝流程
- block:
    - name: Create local directory for offline NFS Server packages
      file:
        path: /tmp/nfs_server_packages
        state: directory
        mode: '0755'

    - name: Copy offline NFS Server packages to target host
      copy:
        src: "{{ playbook_dir }}/../../files/nfs_server_packages/"
        dest: /tmp/nfs_server_packages/
        mode: '0644'

    - name: Find copied server deb files
      find:
        paths: /tmp/nfs_server_packages
        patterns: "*.deb"
      register: server_deb_files

    # 使用不佔日誌空間的極簡精準 loop 寫法
    - name: Install NFS Server via local deb files (Bulk Install)
      apt:
        deb: "{{ server_deb_files.files | map(attribute='path') | list }}"

    - name: Cleanup temporary NFS Server package directory
      file:
        path: /tmp/nfs_server_packages
        state: absent

  when: "'ok installed' not in nfs_server_check.stdout"
  tags: [ install, nfs_server ]


# 建立儲存目錄與導出設定
- name: Create Physical Directory for SQLite Persistence
  file:
    path: "{{ nfs_export_dir }}"
    state: directory
    mode: '0777'
    owner: "{{ container_uid | default(1001) }}"
    group: "{{ container_uid | default(1001) }}"
    recurse: yes
  tags: [ install, nfs_server ]


- name: Configure NFS Exports Permissions (Mapping to UID 1001)
  lineinfile:
    path: /etc/exports
    regexp: "^{{ nfs_export_dir | regex_escape }}\\s+"
    line: "{{ nfs_export_dir }} {{ k3s_subnet_path }}(rw,sync,no_subtree_check,no_root_squash,all_squash,anonuid={{ container_uid | default(1001) }},anongid={{ container_uid | default(1001) }})"
    state: present
  tags: [ install, nfs_server ]
  notify:
    - Reload NFS Exports Table