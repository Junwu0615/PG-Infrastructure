# roles/nfs-server/tasks/main.yml
---

# ----------------------------------------------------------------------
# 【 基礎建設配置 : NFS-Server 】
# ----------------------------------------------------------------------
- name: Gather service facts
  ansible.builtin.service_facts:
  tags: [ install, update, nfs_server ]

# 1. 確保遠端主機的快取目錄存在
- name: Ensure local directory for offline NFS Server packages exists
  file:
    path: /var/cache/local_debs/nfs_server
    state: directory
    mode: '0755'
  tags: [ install, update, nfs_server ]

# 2. 透過 copy 模組分發資產（copy 本身就具備冪等性，檔案相同就不會重複傳輸）
- name: Synchronize offline NFS Server packages to target host
  copy:
    src: "{{ playbook_dir }}/../../files/nfs_server_packages/"
    dest: /var/cache/local_debs/nfs_server/
    mode: '0644'
  register: copy_packages
  tags: [ install, update, nfs_server ]

# 3. Server 端的 dpkg 流
- name: Install NFS Server via local deb files (Idempotent Bulk Install)
  shell: "dpkg -i /var/cache/local_debs/nfs_server/*.deb || dpkg -i /var/cache/local_debs/nfs_server/*.deb"
  register: dpkg_result
  changed_when: "'Setting up' in dpkg_result.stdout"
  tags: [ install, update, nfs_server ]


# ----------------------------------------------------------------------
# 建立儲存目錄與導出設定
# ----------------------------------------------------------------------
- name: Create Physical Directory for SQLite Persistence
  file:
    path: "{{ nfs_export_dir }}"
    state: directory
    mode: '0777'
    owner: "{{ container_uid | default(1001) }}"
    group: "{{ container_uid | default(1001) }}"
    recurse: yes
  tags: [ install, update, nfs_server ]

- name: Configure NFS Exports Permissions (Mapping to UID 1001)
  lineinfile:
    path: /etc/exports
    regexp: "^{{ nfs_export_dir | regex_escape }}\\s+"
    line: "{{ nfs_export_dir }} {{ k3s_subnet_path }}(rw,sync,no_subtree_check,no_root_squash,all_squash,anonuid={{ container_uid | default(1001) }},anongid={{ container_uid | default(1001) }})"
    state: present
  tags: [ install, update, nfs_server ]
  notify:
    - Reload NFS Exports Table