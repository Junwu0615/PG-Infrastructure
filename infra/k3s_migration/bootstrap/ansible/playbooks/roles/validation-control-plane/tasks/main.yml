# roles/validation-control-plane/tasks/main.yml
---

# ----------------------------------------------------------------------
# 【 K3s 配置 : Validation Control Plane 】
# ----------------------------------------------------------------------
# 閉環動態輪詢：利用 until 語法，動態等待 inventory 中定義的所有 Master 統統上線
- name: Wait for All Control Plane Nodes to register and Ready
  ansible.builtin.command: "{{ k3s_bin_dir }} kubectl get nodes"
  register: kubectl_nodes_result
  # 利用 map 提取 stdout 內的所有主機名稱，並直接與控制群組的機器數量做邏輯交集比對
  until: "kubectl_nodes_result.stdout.count('control-plane') == groups['k3s_servers'] | length | int"
  retries: 20
  delay: 5
  changed_when: false
  run_once: true
  tags: [ install, update, validation ]


# 嚴格動態斷言：不再數 'Ready'，也不盲數 'master'，直接用 K8s Label 動態校驗
- name: Assert Control Plane Healthy Nodes Count
  ansible.builtin.assert:
    that:
      - "kubectl_nodes_result.stdout.count('control-plane') == groups['k3s_servers'] | length | int"
    fail_msg: "[CRITICAL] K3s HA Master Group validation failed!"
    success_msg: "[SUCCESS] All K3s Masters are fully operational."
  run_once: true
  tags: [ install, update, validation ]


- name: Print Control Plane Cluster Status summary
  ansible.builtin.debug:
    msg:
      - "=========================================================="
      - "  K3s Control Plane High Availability Architecture Ok     "
      - "  Cluster VIP Entrance: https://{{ k3s_vip }}:{{ k3s_api_port }} "
      - "=========================================================="
  run_once: true
  tags: [ install, update, validation ]