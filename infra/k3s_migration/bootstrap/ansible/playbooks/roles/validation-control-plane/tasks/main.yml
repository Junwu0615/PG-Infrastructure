# roles/validation-control-plane/tasks/main.yml
---

# ----------------------------------------------------------------------
# 【 K3s 配置 : Validation Control Plane 】
# ----------------------------------------------------------------------

- name: Wait for All Control Plane Nodes to register and Ready
  ansible.builtin.command: "{{ k3s_bin_dir }} kubectl get nodes"
  register: kubectl_nodes_result
  until: >
    "k3s-master-0" in kubectl_nodes_result.stdout and
    "k3s-master-1" in kubectl_nodes_result.stdout and
    "k3s-master-2" in kubectl_nodes_result.stdout
  retries: 20
  delay: 5
  changed_when: false
  run_once: true
  tags: [ validation ]


- name: Assert Control Plane Healthy Nodes Count
  ansible.builtin.assert:
    that:
      - "kubectl_nodes_result.stdout.count('Ready') == 3"
    fail_msg: "[CRITICAL] K3s HA Master Group validation failed! Check etcd log."
    success_msg: "[SUCCESS] All 3 K3s Masters are registered in topology with 'Ready' status."
  run_once: true
  tags: [ validation ]


- name: Print Control Plane Cluster Status summary
  ansible.builtin.debug:
    msg:
      - "=========================================================="
      - "  K3s Control Plane High Availability Architecture Ok     "
      - "  Cluster VIP Entrance: https://{{ k3s_vip }}:{{ k3s_api_port }} "
      - "=========================================================="
  run_once: true
  tags: [ validation ]