# roles/validation-control-plane/tasks/main.yml
---

# ----------------------------------------------------------------------
# 【 K3s 配置 : Validation Control Plane 】
# ----------------------------------------------------------------------
# 閉環動態輪詢：利用 until 語法，動態等待 inventory 中定義的所有 Master 統統上線
- name: Wait for All Control Plane Nodes to register and Ready
  ansible.builtin.command: "{{ k3s_bin_dir }}/k3s kubectl get nodes"
  register: kubectl_nodes_result
  # 拒絕硬編碼防線：動態生成 Python 的「列表推導式」
  # 只要 groups['k3s_servers'] 裡面的 IP 或 Hostname 對應的節點名稱（k3s-master-X）
  # 任何一個不在 stdout 裡面，就不放行，直到全數就緒
  until: >
    {% for host in groups['k3s_servers'] %}
    "k3s-master-{{ loop.index0 }}" in kubectl_nodes_result.stdout{% if not loop.last %} and {% endif %}
    {% endfor %}
  retries: 20
  delay: 5
  changed_when: false
  run_once: true
  tags: [ install, update, validation ]


# 嚴格動態斷言：不再數 'Ready'，也不盲數 'master'，直接用 K8s Label 動態校驗
- name: Assert Control Plane Healthy Nodes Count
  ansible.builtin.assert:
    that:
      # 利用 stdout.count 數出帶有 control-plane 角色的行數
      # 右邊動態取得 groups['k3s_servers'] 的陣列長度（這份 inventory 就會自動算成 3）
      - "kubectl_nodes_result.stdout.count('control-plane') == groups['k3s_servers'] | length | int"
    fail_msg: |
      [CRITICAL] K3s HA Master Group validation failed! 
      Expected Masters (from Inventory): {{ groups['k3s_servers'] | length }}
      Current Active Masters in K8s   : {{ kubectl_nodes_result.stdout.count('control-plane') }}
    success_msg: "[SUCCESS] All {{ groups['k3s_servers'] | length }} K3s Masters are registered and synchronized in cluster topology."
  run_once: true
  tags: [ install, update, validation ]


- name: Print Control Plane Cluster Status summary
  ansible.builtin.debug:
    msg:
      - "=========================================================="
      - "  K3s Control Plane High Availability Architecture Ok     "
      - "  Cluster VIP Entrance: https://{{ k3s_vip }}:{{ k3s_api_port }} "
      - "=========================================================="
  run_once: true
  tags: [ install, update, validation ]