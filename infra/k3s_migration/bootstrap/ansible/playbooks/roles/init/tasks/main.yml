# roles/init/tasks/main.yml
---

# ----------------------------------------------------------------------
# 【 基礎網路與偵錯工具 】
# ----------------------------------------------------------------------
- name: Create Offline Tools Directory
  file:
    path: /tmp/init_packages
    state: directory
    mode: "0755"


- name: Copy Offline Base Tools (net-tools, etc)
  copy:
    src: "{{ playbook_dir }}/../../files/init_packages/"
    dest: /tmp/init_packages/
  failed_when: false


- name: Install Offline Base Packages
  shell: dpkg -i /tmp/init_packages/*.deb
  failed_when: false
  changed_when: false


- name: Cleanup Offline Tools Directory
  file:
    path: /tmp/init_packages
    state: absent


# ----------------------------------------------------------------------
# 【 物理抹殺 Swap 】
# ----------------------------------------------------------------------
- name: Disable Swap in fstab
  mount:
    name: "{{ item }}"
    fstype: swap
    state: absent
  loop: [ "none", "swap" ]
  tags: [ install, update ]


- name: Check if swap is currently active
  shell: cat /proc/swaps | wc -l
  register: swap_check
  changed_when: false
  tags: [ install, update ]


- name: Disable Swap in memory
  command: swapoff -a
  when: swap_check.stdout | int > 1
  tags: [ install, update ]


# ----------------------------------------------------------------------
# 【 K8s 核心模組 】
# ----------------------------------------------------------------------
- name: Enable Kernel Modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay
  tags: [ install, update ]


- name: Ensure Modules Load on boot
  copy:
    content: |
      br_netfilter
      overlay
    dest: /etc/modules-load.d/k8s.conf
  tags: [ install, update ]


# ----------------------------------------------------------------------
# 【 網路轉發 】
# ----------------------------------------------------------------------
# 確保 sysctl 變更重開機不丟失 => 強制寫入獨立設定檔 ( sysctl_file )
- name: Enable IPv4 Forwarding and Adjust Network Security
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
    reload: yes
  loop:
    - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { name: 'net.ipv4.ip_forward', value: '1' }
    - { name: 'net.ipv4.conf.all.rp_filter', value: '0' }
    - { name: 'net.ipv4.conf.default.rp_filter', value: '0' }
  tags: [ install, update ]