#cloud-config
# 1. 設定 Hostname ( 解決 localhost 問題 )
hostname: ${hostname}
fqdn: ${hostname}.local
preserve_hostname: false

# 2. 合併為單一 users 區塊
users:
  - name: debian
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    # 這裡建議使用變數注入公鑰
    ssh_authorized_keys:
      - ${ssh_public_key}
    # 預設密碼 (選填，用於緊急除錯)
    passwd: "$6$rounds=4096$6sH0.xMvY$mO/vM7xY.q/8P1H/WnK9T5L5N.5F6F.7G8H9I0J1K2L3M4N5O6P7Q8R9S0"

# 3. 密碼登入設定
ssh_pwauth: yes
chpasswd:
  list: |
    debian:linux
  expire: False

# 4. 強制重啟服務確保設定生效
runcmd:
  - sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
  - systemctl restart ssh
  - echo "Cloud-init finished for ${hostname}" > /tmp/cloud-config-status