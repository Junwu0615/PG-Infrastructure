---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pv-patcher-sa
  namespace: kube-system
  annotations:
    argocd.io/hook: PreSync
    argocd.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-pv-patcher-clusterrole
  annotations:
    argocd.io/hook: PreSync
    argocd.io/hook-delete-policy: HookSucceeded
rules:
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-pv-patcher-binding
  annotations:
    argocd.io/hook: PreSync
    argocd.io/hook-delete-policy: HookSucceeded
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-pv-patcher-sa
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-pv-patcher-clusterrole
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-patch-pv-{{ .Release.Revision }}
  namespace: kube-system
  annotations:
    argocd.io/hook: PreSync
    argocd.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-pv-patcher-sa
      containers:
      - name: patcher
        image: "{{ .Values.pv.image | default "docker.io/rancher/local-path-provisioner:v0.0.24" }}"
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          TARGET_PV="{{ .Values.pv.name | default "nfs-storage-homelab-test-nfs-pv" }}"

          # 使用掛載進來的宿主機 k3s 工具進行呼叫
          STATUS=$(/host/bin/k3s kubectl get pv ${TARGET_PV} -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")

          if [ "$STATUS" = "Released" ]; then
            echo "🚨 [DR Test] 偵測到 PV [ ${TARGET_PV} ] 處於 Released，自動擦除 claimRef..."
            /host/bin/k3s kubectl patch pv ${TARGET_PV} -p '{"spec":{"claimRef":null}}'
            echo "✅ 成功解綁！"
          else
            echo "ℹ️ [DR Test] PV [ ${TARGET_PV} ] 目前狀態為 [ $STATUS ]，無需干預。"
          fi
        volumeMounts:
        - name: host-bin
          mountPath: /host/bin
          readOnly: true
      restartPolicy: OnFailure
      # 透過 volumes 把宿主機本機的 k3s 執行檔借給容器用
      volumes:
      - name: host-bin
        hostPath:
          path: /usr/local/bin
          type: Directory