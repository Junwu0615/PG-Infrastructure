tempo:
  # 強制開啟單機模式
  mode: singleBinary

  # 儲存配置 (Local 模式最穩定)
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces

  ingester:
    # 確保開啟 persistence，否則數據重啟即消失
    persistence:
      enabled: true
      size: 5Gi
      storageClass: standard

    nodeSelector:
      workload-class: stateful
      #      hardware-type: high-io

    affinity: |
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: workload-class
                  operator: In
                  values:
                    - stateful
  #                - key: hardware-type
  #                  operator: In
  #                  values:
  #                    - high-io

  # Distributor 接收器
  distributor:
    config:
      receivers:
        otlp:
          protocols:
            grpc: { endpoint: 0.0.0.0:4317 }
            http: { endpoint: 0.0.0.0:4318 }
  


  # 接收器設定 (統一在一個區塊)
  config: |
    server:
      http_listen_port: 3100
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

  # 持久化設定 (避免資料丟失導致的重啟)
  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard


  ingress:
    enabled: true
    ingressClassName: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - host: tempo.k8s.local
        paths:
          - path: /
            pathType: Prefix
    tls: [ ]

  # 資源限制：給予充足空間避免 Crash
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi