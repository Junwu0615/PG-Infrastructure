postgresql:
  global:
    security:
      allowInsecureImages: true

  auth:
    username: pguser
    database: pgdatabase
    existingSecret: postgresql-credentials
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: postgres-password
      replicationPasswordKey: replication-password

  # 建議在 GitOps 中固定 Image Tag，避免自動浮動
  image:
    registry: docker.io
    # 官方已將 Image 移至 legacy 倉庫，並停止在 bitnami 倉庫提供該版本
    repository: bitnamilegacy/postgresql
#    repository: bitnami/postgresql
    tag: 17.2.0-debian-12-r2

#  sharedPreloadLibraries: "pgaudit, pg_stat_statements, pg_wait_sampling"

  primary:
#    extendedConfiguration: |
#      shared_preload_libraries = 'pg_stat_statements, pg_wait_sampling'

    # 掛載資料庫初始化 ConfigMap
    extraVolumes:
      - name: custom-init-scripts
        configMap:
          name: postgres-init-configmap

    extraVolumeMounts:
      - name: custom-init-scripts
        mountPath: /docker-entrypoint-initdb.d/

    pgHbaConfiguration: |-
      # TYPE  DATABASE        USER            ADDRESS                 METHOD
      local   all             all                                     trust
      host    all             all             127.0.0.1/32            md5
      host    all             all             0.0.0.0/0               md5

    persistence:
      enabled: true
      size: 20Gi
      # K3s 內建的本地硬碟驅動
      storageClassName: local-path
      accessModes:
        # RWO 單節點讀寫: 該磁碟只能被單一個 Node 掛載為讀寫模式。同一個 Node 上的多個 Pod 可以共享它，但跨 Node 就不行
        - ReadWriteOnce
        # ROX 多節點唯讀: 該磁碟可以同時被多個不同的 Node 共同掛載，但所有節點都只有唯讀（Read-Only）權限
#        - ReadOnlyMany
        # RWX 多節點讀寫: 該磁碟可以同時被多個不同的 Node 共同掛載，且所有節點都能自由讀寫
#        - ReadWriteMany
        # RWOP: 單 Pod 獨佔讀寫: 整個叢集中只能有一個 Pod 掛載此磁碟。即便在同一個 Node 裡，其他 Pod 也完全無法染指。
#        - ReadWriteOncePod
      mountPath: /bitnami/postgresql
      subPath: "v7-data"

    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

    nodeSelector:
      kubernetes.io/hostname: "k3s-agent-2"
      workload-class: stateful
#      hardware-type: high-io

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: workload-class
                  operator: In
                  values:
                    - stateful
#                - key: hardware-type
#                  operator: In
#                  values:
#                    - high-io

#  readReplica:
#    nodeSelector:
#      workload-class: stateful
#      hardware-type: high-io
#
#    affinity:
#      nodeAffinity:
#        requiredDuringSchedulingIgnoredDuringExecution:
#          nodeSelectorTerms:
#            - matchExpressions:
#                - key: workload-class
#                  operator: In
#                  values:
#                    - stateful
#                - key: hardware-type
#                  operator: In
#                  values:
#                    - high-io


  # 監控最佳實踐：啟用 Prometheus Metrics Exporter
  metrics:
    enabled: true
    image:
      registry: docker.io
      repository: bitnamilegacy/postgres-exporter
      tag: 0.17.1-debian-12-r0

    service:
      ports:
        metrics: 9187

    serviceMonitor:
      enabled: true
      interval: 30s
      # 依據 Prometheus Operator 設定補上對應的標籤
      labels:
        release: prometheus-stack

    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  # 安全最佳實踐：不使用預設的非 root 權限，明確指定 UID
#  containerSecurityContext:
#    enabled: true
#    runAsUser: 1001

  containerSecurityContext:
    enabled: false

  podSecurityContext:
    enabled: false