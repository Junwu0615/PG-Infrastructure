apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: postgresql-appset
  namespace: argocd
  #  finalizers:
  #    # 千萬別在有狀態服務加這行，否則一不小心就會引發連鎖全面崩潰
  #    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: databases

spec:
  generators:
    - list:
        elements:
          - env: homelab-test
            server: https://kubernetes.default.svc
#          - env: homelab-stage
#            server: https://kubernetes.default.svc
#          - env: homelab-prod
#            server: https://kubernetes.default.svc

  template:
    metadata:
      name: 'postgresql-{{env}}'

    spec:
      project: databases
      source:
        repoURL: http://192.168.0.15:8090/pg/infra-live.git
        targetRevision: main
        path: charts/databases/postgresql
        helm:
          valueFiles:
            - 'values/common.yaml'
            - '../../../environments/{{env}}/postgresql-values.yaml'
      destination:
        server: '{{server}}'
        # 自動帶入命名空間，讓不同環境的互相隔離
        namespace: 'postgresql-{{env}}'

      syncPolicy:
        # prune: true => 務必確保 Chart 裡的 PVC 有設定 reclaimPolicy: Retain，防止 Git 誤刪導致硬碟暴斃
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnFields=true
          - FailOnSharedResource=false
#          - Replace=true
          - PruneLast=true
          - PrunePropagationPolicy=foreground
          - RespectIgnoreDifferences=true