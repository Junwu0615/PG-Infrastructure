apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ingress-nginx-appset
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform

spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster

  template:
    metadata:
      name: 'ingress-nginx-{{metadata.labels.env}}'
    spec:
      project: platform
      source:
        # 指向官方 Helm 源
        repoURL: https://kubernetes.github.io/ingress-nginx
        chart: ingress-nginx
        #  # 鎖定版本
        targetRevision: 4.10.0
        helm:
          valueFiles:
            # 跨目錄抓取專屬的基礎 values 與環境 values
            - 'http://192.168.0.15:8090/pg/infra-live/-/tree/main/environments/{{metadata.labels.env}}/ingress-nginx-values.yaml'
      destination:
        server: '{{server}}'
        namespace: 'ingress-nginx-{{metadata.labels.env}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      #      - Replace=true
      #      - PruneLast=true