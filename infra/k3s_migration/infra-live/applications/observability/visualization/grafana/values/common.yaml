grafana:
  replicas: 1
  adminUser: admin
  adminPassword: admin123

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.k8s.local

  #grafana.ini:
  #  server:
  #    root_url: http://grafana.k8s.local

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi

    limits:
      cpu: 500m
      memory: 512Mi

  # 直接將資源定位至 Grafana 來源設定
  datasources:
    datasources.yaml:
      apiVersion: 1

      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus-stack-kube-prom-prometheus.prometheus-stack.svc.cluster.local:9090
          isDefault: true

        - name: Loki
          type: loki
          access: proxy
          url: http://loki-read.loki.svc.cluster.local:3100