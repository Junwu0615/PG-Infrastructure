apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  # 要與 svc 命名完全吻合 才能配對 addr
  name: tempo-query-frontend

  namespace: tempo
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"

spec:
  ingressClassName: "nginx"
  rules:
  - host: tempo.k8s.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tempo-query-frontend
            port:
              number: 3100