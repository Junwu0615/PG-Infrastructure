prometheus:
  replicaCount: 1

  server:
    ingress:
      enabled: false

    persistentVolume:
      enabled: true
      size: 10Gi

    resources:
      requests:
        cpu: 250m
        memory: 512Mi

      limits:
        cpu: 1000m
        memory: 1Gi

  alertmanager:
    enabled: true

    persistentVolume:
      enabled: true
      size: 2Gi

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: true

  pushgateway:
    enabled: false

  serviceAccounts:
    server:
      create: true

  rbac:
    create: true