apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: prometheus-stack
  namespace: argocd

spec:
  project: observability

  source:
    repoURL: http://192.168.0.15:8090/pg/infra-live.git
    targetRevision: main
    path: applications/observability/metrics/prometheus-stack

    helm:
      valueFiles:
        - values/common.yaml
        - values/test.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prometheus-stack

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
#      - Replace=true
#      - PruneLast=true

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        # 1. 忽略所有版本內的 description (使用正則的概念，直接忽略該屬性)
        - /spec/versions
        # 2. 忽略註解版本號
        - /metadata/annotations/controller-gen.kubebuilder.io/version