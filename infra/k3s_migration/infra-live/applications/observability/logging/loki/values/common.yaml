loki:
  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - loki.k8s.local

  gateway:
    enabled: false

  auth_enabled: false
  
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1

  storage_config:
    filesystem:
      directory: /var/loki/chunks
    local:
      directory: /var/loki/chunks
    
    schema_config:
      configs:
        - from: "2020-10-24"
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h


singleBinary:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi

    limits:
      cpu: 200m
      memory: 512Mi


global:
  image:
    tag: "2.9.11"