loki:
  singleBinary:
    replicas: 1

  deploymentMode: SingleBinary

  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  persistence:
    enabled: true
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi

    limits:
      cpu: 500m
      memory: 512Mi

  monitoring:
    dashboards:
      enabled: true

    serviceMonitor:
      enabled: true