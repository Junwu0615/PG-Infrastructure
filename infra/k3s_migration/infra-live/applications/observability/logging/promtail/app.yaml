apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: promtail
  namespace: argocd

spec:
  project: observability

  source:
    repoURL: http://192.168.0.15:8090/pg/infra-live.git
    targetRevision: main
    path: applications/observability/logging/promtail

    helm:
      valueFiles:
        - values/common.yaml
        - values/test.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: promtail

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true