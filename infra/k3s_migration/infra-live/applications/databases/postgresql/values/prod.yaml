postgresql:
  architecture: replication

  # 核心：啟用多個唯讀副本以分攤流量與提高可用性
  replica:
    replicaCount: 2
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: "1"
        memory: 2Gi
    persistence:
      enabled: true
      storageClass: "premium-rwo" # 推薦使用高 IOPS 的 SSD 雲端硬碟
      size: 50Gi

  primary:
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
    persistence:
      enabled: true
      storageClass: "premium-rwo"
      size: 100Gi

  # 生產環境安全參數最佳實踐
  tls:
    enabled: true
    autoGenerated: true # 或指定已有的外部憑證 Secret

  # 網路策略安全隔離
  networkPolicy:
    enabled: true
    allowExternal: false # 僅允許 K8s 叢集內部流量訪問