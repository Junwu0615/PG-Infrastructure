apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: pg-apps
  namespace: argocd

spec:
  project: pg-apps

  source:
    repoURL: http://192.168.0.15:8090/pg/infra-live.git
    targetRevision: main
    path: applications/pg-apps

#    directory:
#      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: pg-apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true