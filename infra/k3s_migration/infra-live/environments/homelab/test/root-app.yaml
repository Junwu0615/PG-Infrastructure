apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: homelab-test-root
  namespace: argocd
  # 確保留空 finalizers，保護根節點安全

spec:
  # 保持 default，讓大總管有權限派發其他不同專案（Project）的子應用
  project: default

  source:
    repoURL: http://192.168.0.15:8090/pg/infra-live.git
    targetRevision: main
    path: environments/homelab/test

    # 遞迴掃描整個目錄，讓大總管能夠自動識別並管理底下的所有子應用
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
#      - Replace=true
#      - PruneLast=true