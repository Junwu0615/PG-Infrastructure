apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: databases
  # 分類關鍵: 資源建立在 argocd
  namespace: argocd
  finalizers:
    # 確保刪除母應用時，子應用也會一起乾淨刪除
    - resources-finalizer.argocd.argoproj.io

spec:
  project: databases
  source:
    repoURL: http://192.168.0.15:8090/pg/infra-live.git
    targetRevision: main
    # 大類掃描所有小類
    path: applications/databases

  destination:
    server: https://kubernetes.default.svc
    # 分類關鍵: 資源建立在 argocd
    namespace: argocd

#  clusterResourceWhitelist:
#    - group: '*'
#      kind: '*'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
#      - Replace=true
#      - PruneLast=true