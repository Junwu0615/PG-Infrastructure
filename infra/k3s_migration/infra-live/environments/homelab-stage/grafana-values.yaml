grafana:
#  namespaceOverride: "grafana-homelab-stage"
  namespaceOverride: "observability-homelab-stage"

  replicas: 1
  adminPassword: stage-password

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.k8s.local

  persistence:
    enabled: true
    size: 5Gi

  # 將資源定位至 Grafana 來源設定
  datasources:
    datasources.yaml:
      apiVersion: 1

      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus-stack-homelab-t-prometheus.observability-homelab-stage.svc.cluster.local:9090
          isDefault: true

        - name: Loki
          type: loki
          access: proxy
          url: http://loki-homelab-stage.observability-homelab-stage.svc.cluster.local:3100
          # 明確指定內部讀取路徑的 API 根節點，繞過 Loki 5.x 讀取節點對根路徑的拒絕
          jsonData:
            httpHeaderName1: "X-Scope-OrgID"
            timeout: 15
          secureJsonData:
            # 預設無認證模式下的常規值
            httpHeaderValue1: "fake"

        - name: Tempo
          type: tempo
          access: proxy
          url: http://tempo-homelab-stage-query-frontend.observability-homelab-stage.svc.cluster.local:3100
          jsonData:
            # 同步防禦 Loki 相同的 401 / no org id 潛在多租戶隔離限制
            httpHeaderName1: "X-Scope-OrgID"
            timeout: 15
          secureJsonData:
            httpHeaderValue1: "fake"
