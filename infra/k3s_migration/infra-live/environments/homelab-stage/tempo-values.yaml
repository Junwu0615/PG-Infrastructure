tempo-distributed:
  # 強制覆蓋 Tempo Chart 的 Namespace 拼接邏輯
  namespaceOverride: "tempo-homelab-stage"
  # 有些版本的 Tempo Chart 是用這個欄位，保險起見一起加上：
  fullnameOverride: "tempo"

  ingester:
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
  distributor:
    replicas: 1
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
  querier:
    replicas: 1
  queryFrontend:
    replicas: 1

  compactor:
    persistence:
      enabled: true
      size: 10Gi
