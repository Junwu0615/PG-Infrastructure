ingress-nginx:
  tcp:
    5432: "postgresql-homelab-prod/postgresql-homelab-prod:5432"

  controller:
    replicaCount: 3

    admissionWebhooks:
      enabled: true
      patch:
        enabled: true
        image:
          registry: registry.k8s.io
          image: ingress-nginx/kube-webhook-certgen
          tag: v1.4.0
      service:
        # 名稱不是預設 => 可指定
        name: ingress-nginx-controller-admission
        namespace: ingress-nginx-homelab-prod

    resources:
      requests:
        cpu: 100m
        memory: 128Mi

      limits:
        cpu: 300m
        memory: 256Mi