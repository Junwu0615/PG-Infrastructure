ingress-nginx:
  tcp:
    3100: "observability-homelab-prod/loki-homelab-prod:3100"
    9095: "observability-homelab-prod/loki-homelab-prod:9095"
    5432: "databases-homelab-prod/postgresql-homelab-prod:5432"

  controller:
    replicaCount: 3

    admissionWebhooks:
      enabled: true
      patch:
        enabled: true
        image:
          registry: registry.k8s.io
          image: ingress-nginx/kube-webhook-certgen
          tag: v1.4.0
      service:
        # 名稱不是預設 → 可指定
        name: ingress-nginx-controller-admission
#        namespace: ingress-nginx-homelab-prod
        namespace: platform-homelab-prod

    resources:
      requests:
        cpu: 100m
        memory: 128Mi

      limits:
        cpu: 300m
        memory: 256Mi