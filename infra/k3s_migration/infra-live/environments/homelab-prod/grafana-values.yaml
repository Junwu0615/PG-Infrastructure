grafana:
  replicas: 2
  adminPassword: prod-password

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana-prod.k8s.local

  persistence:
    enabled: true
    size: 20Gi

  resources:
    requests:
      cpu: 500m
      memory: 512Mi

    limits:
      cpu: 1
      memory: 1Gi