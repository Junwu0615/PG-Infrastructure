tempo-distributed:
  # 強制覆蓋 Tempo Chart 的 Namespace 拼接邏輯
  namespaceOverride: "tempo-homelab-test"
  # 有些版本的 Tempo Chart 是用這個欄位，保險起見一起加上：
  fullnameOverride: "tempo"

  ingester:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi

  distributor:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  querier:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  queryFrontend:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  compactor:
    persistence:
      enabled: true
      size: 5Gi