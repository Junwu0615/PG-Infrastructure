postgresql:
  namespaceOverride: "postgresql-homelab-test"

  architecture: standalone # 測試環境單節點即可，節省資源

  # 資源配額最佳實踐：明確設定限制防止佔滿 OOM Kill
  primary:
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

    persistence:
      enabled: true
      size: 10Gi
      storageClass: local-path