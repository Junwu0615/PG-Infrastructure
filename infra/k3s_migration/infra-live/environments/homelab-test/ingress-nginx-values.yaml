ingress-nginx:
  tcp:
    3100: "observability-homelab-test/loki-homelab-test:3100"
    9095: "observability-homelab-test/loki-homelab-test:9095"
    5432: "databases-homelab-test/postgresql-homelab-test:5432"

  controller:
    replicaCount: 2

    admissionWebhooks:
      enabled: true
      patch:
        enabled: true
        image:
          registry: registry.k8s.io
          image: ingress-nginx/kube-webhook-certgen
          tag: v1.4.0
      service:
        # 名稱不是預設 → 可指定
        name: ingress-nginx-controller-admission
#        namespace: ingress-nginx-homelab-test
        namespace: platform-homelab-test

    resources:
      requests:
        cpu: 100m
        memory: 128Mi

      limits:
        cpu: 300m
        memory: 256Mi