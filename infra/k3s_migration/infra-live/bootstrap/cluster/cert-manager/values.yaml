crds:
  enabled: true

nodeSelector:
  workload-class: stateless
  traffic-zone: internal-only

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload-class
              operator: In
              values:
                - stateless
            - key: traffic-zone
              operator: In
              values:
                - internal-only

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 300m
    memory: 256Mi

prometheus:
  enabled: true