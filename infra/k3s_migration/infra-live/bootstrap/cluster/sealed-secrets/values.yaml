fullnameOverride: sealed-secrets-controller

nodeSelector:
  workload-class: stateless
  traffic-zone: internal-only

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload-class
              operator: In
              values:
                - stateless
            - key: traffic-zone
              operator: In
              values:
                - internal-only

resources:
  requests:
    cpu: 50m
    memory: 64Mi

  limits:
    cpu: 200m
    memory: 128Mi