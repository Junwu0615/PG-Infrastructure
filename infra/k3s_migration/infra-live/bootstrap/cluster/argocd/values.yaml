global:
  domain: argocd.local

configs:
  params:
    server.insecure: true

server:
  replicas: 1

  service:
    type: LoadBalancer

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi

    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi

    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 1

controller:
  replicas: 1

redis:
  enabled: true

dex:
  enabled: false