apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: homelab-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://gitlab.example.com/infra-live.git
    targetRevision: main
    path: environments/homelab/test

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true