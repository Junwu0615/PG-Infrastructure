apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        port: 80
        expose: true
        exposedPort: 80
      websecure:
        port: 443
        expose: true
        exposedPort: 443
      gitlab-shell:
        port: 2222
        expose: true
        exposedPort: 2222
    entryPoints:
      web:
        address: ":80"
      websecure:
        address: ":443"
      gitlab-shell:
        address: ":2222"