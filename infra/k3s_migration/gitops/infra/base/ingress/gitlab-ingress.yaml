apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab-ingress
  namespace: infra-tools
  annotations:
    # 確保使用 Traefik 內建的預設 web (port 80)
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web

spec:
  rules:
  - host: gitlab.local  # 請確保你在 hosts 檔案有指向此 IP
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gitlab-infra-webservice-default
            port:
              number: 8181