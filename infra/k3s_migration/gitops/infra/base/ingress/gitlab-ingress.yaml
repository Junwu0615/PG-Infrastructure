apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitlab-ingress
  namespace: infra-tools
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`gitlab.k3s.local`)
    kind: Rule
    services:
    - name: gitlab-infra-webservice-default
      port: 8181