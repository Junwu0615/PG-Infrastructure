apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-configmap
  namespace: infra-data
data:
  init.sql: |
    DO $$
    BEGIN
        RAISE NOTICE '===================================================';
        RAISE NOTICE '[INIT-STAGE 1/3] 開始建立基礎使用者、角色與擴充功能...';
        RAISE NOTICE '===================================================';
    END
    $$;

    -- 1. 建立監控帳號
    DO $$
    BEGIN
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = 'postgres_exporter') THEN
            CREATE USER postgres_exporter WITH PASSWORD 'exporter';
        END IF;
    END
    $$;
    GRANT pg_monitor TO postgres_exporter;

    -- 2. 建立 GitLab 帳號 (密碼必須與你 GitLab Pod 連線用的相符)
    DO $$
    BEGIN
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = 'gitlab') THEN
            CREATE USER gitlab WITH PASSWORD 'SuperSecurePostgresPassword';
            ALTER USER gitlab WITH SUPERUSER;
        END IF;
    END
    $$;

    -- 3. 建立業務相關角色與使用者
    DO $$
    BEGIN
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'oltp_owner') THEN
            CREATE ROLE oltp_owner NOLOGIN;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = 'oltp_user') THEN
            CREATE USER oltp_user WITH PASSWORD 'oltp_pwd';
        END IF;
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'olap_owner') THEN
            CREATE ROLE olap_owner NOLOGIN;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = 'olap_user') THEN
            CREATE USER olap_user WITH PASSWORD 'olap_pwd';
        END IF;
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = 'migration_user') THEN
            CREATE USER migration_user WITH PASSWORD 'migration_pwd';
        END IF;
    END
    $$;

    -- 允許當前超級使用者為這些角色配置 DEFAULT PRIVILEGES
    GRANT oltp_owner, olap_owner TO postgres;

    -- 4. 安裝 dblink (必須在 postgres 資料庫下安裝，用於動態建庫)
    CREATE EXTENSION IF NOT EXISTS dblink;

    -- ==========================================================
    -- [INIT-STAGE 2/3] 動態建立多資料庫 (嚴謹密碼認證版)
    -- ==========================================================
    DO $$
    BEGIN
        RAISE NOTICE '===================================================';
        RAISE NOTICE '[INIT-STAGE 2/3] 開始建立 gitlabhq_production 與 biz_db...';
        RAISE NOTICE '===================================================';
    END
    $$;

    DO $$
    DECLARE
        -- 這裡請換成你實際部屬時設定的 POSTGRES_PASSWORD
        -- 如果在 K8s env 中沒特別改，Bitnami 預設在初始化時會吃這個密碼
        pg_pwd text := 'SuperSecurePostgresPassword'; 
    BEGIN
        -- 建立安全的 dblink 連線通道
        PERFORM dblink_connect('db_creation_conn', 'host=127.0.0.1 dbname=' || current_database() || ' user=postgres password=' || pg_pwd);

        -- 建立 gitlabhq_production
        IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'gitlabhq_production') THEN
            PERFORM dblink_exec('db_creation_conn', 'CREATE DATABASE gitlabhq_production OWNER gitlab');
        END IF;

        -- 建立 biz_db
        IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'biz_db') THEN
            PERFORM dblink_exec('db_creation_conn', 'CREATE DATABASE biz_db');
        END IF;

        -- 斷開 dblink 連線
        PERFORM dblink_disconnect('db_creation_conn');
    EXCEPTION 
        WHEN OTHERS THEN
            -- 確保出錯時也會把連線斷開，避免 block
            IF position('db_creation_conn' in dblink_current_connections()) > 0 THEN
                PERFORM dblink_disconnect('db_creation_conn');
            END IF;
            RAISE EXCEPTION '動態建立資料庫失敗: %', SQLERRM;
    END
    $$;

    -- ==========================================================
    -- [INIT-STAGE 3/3] 配置時區與調整權限
    -- ==========================================================
    DO $$
    BEGIN
        RAISE NOTICE '===================================================';
        RAISE NOTICE '[INIT-STAGE 3/3] 配置資料庫時區與權限...';
        RAISE NOTICE '===================================================';
    END
    $$;

    -- 調整時區 (加入存在性檢查，避免還沒建的 DB 噴錯)
    ALTER DATABASE postgres SET timezone TO 'Asia/Taipei';

    DO $$
    BEGIN
        IF EXISTS (SELECT FROM pg_database WHERE datname = 'gitlabhq_production') THEN
            EXECUTE 'ALTER DATABASE gitlabhq_production SET timezone ''Asia/Taipei''';
            EXECUTE 'GRANT ALL PRIVILEGES ON DATABASE gitlabhq_production TO gitlab';
        END IF;
        
        IF EXISTS (SELECT FROM pg_database WHERE datname = 'biz_db') THEN
            EXECUTE 'ALTER DATABASE biz_db SET timezone ''Asia/Taipei''';
        END IF;

        IF EXISTS (SELECT FROM pg_database WHERE datname = 'airflow') THEN
            EXECUTE 'ALTER DATABASE airflow SET timezone ''Asia/Taipei''';
        END IF;
    END
    $$;

    DO $$
    BEGIN
        RAISE NOTICE '===================================================';
        RAISE NOTICE '[SUCCESS] 全階段基礎架構與多資料庫初始化完畢！';
        RAISE NOTICE '===================================================';
    END
    $$;