apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-configmap
  namespace: infra-data
data:
  init.sql: |
    -- 1. 基礎設定
    DO $$
    BEGIN
        RAISE NOTICE '[INIT-STAGE 1/3] 建立帳號與權限...';
        -- 既有角色建立
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = 'gitlab') THEN
            CREATE USER gitlab WITH PASSWORD 'SuperSecurePostgresPassword';
        END IF;
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'oltp_owner') THEN
            CREATE ROLE oltp_owner WITH LOGIN PASSWORD 'oltp_pwd';
        END IF;
        -- 既有擴充安裝
        CREATE EXTENSION IF NOT EXISTS dblink;
    END
    $$;

    -- 2. 資料庫建立
    DO $$
    DECLARE pg_pwd text := 'SuperSecurePostgresPassword'; 
    BEGIN
        RAISE NOTICE '[INIT-STAGE 2/3] 建立多資料庫...';
        PERFORM dblink_connect('conn', 'host=127.0.0.1 dbname=postgres user=postgres password=' || pg_pwd);
        IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'gitlabhq_production') THEN
            PERFORM dblink_exec('conn', 'CREATE DATABASE gitlabhq_production OWNER gitlab');
        END IF;
        IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'biz_db') THEN
            PERFORM dblink_exec('conn', 'CREATE DATABASE biz_db OWNER oltp_owner');
        END IF;
        PERFORM dblink_disconnect('conn');
    END
    $$;

    -- 3. 權限與 Extension 對齊 (核心改進)
    DO $$
    BEGIN
        RAISE NOTICE '[INIT-STAGE 3/3] 配置目標庫權限...';
        -- 為 gitlabhq_production 自動補齊 GitLab 必須的權限與 Extension
        PERFORM dblink_connect('db_fix_conn', 'host=127.0.0.1 dbname=gitlabhq_production user=postgres password=''SuperSecurePostgresPassword''');
        PERFORM dblink_exec('db_fix_conn', 'ALTER SCHEMA public OWNER TO gitlab');
        PERFORM dblink_exec('db_fix_conn', 'CREATE EXTENSION IF NOT EXISTS pg_trgm');
        PERFORM dblink_exec('db_fix_conn', 'CREATE EXTENSION IF NOT EXISTS btree_gist');
        PERFORM dblink_exec('db_fix_conn', 'GRANT ALL ON SCHEMA public TO gitlab');
        PERFORM dblink_disconnect('db_fix_conn');
        
        -- 設定全域時區
        ALTER DATABASE gitlabhq_production SET timezone TO 'Asia/Taipei';
        ALTER DATABASE biz_db SET timezone TO 'Asia/Taipei';
    END
    $$;