global:
  postgresql:
    auth:
      # 超級管理員密碼（用於初始化、Dba 操作，以及外部服務連線的最高備援）
      postgresPassword: "SuperSecurePostgresPassword"

      # 讓 Helm 自動建立 Airflow 專用的獨立庫與對應帳號
      username: "airflow"
      password: "AirflowPassword123"
      database: "airflow"

primary:
  # 關鍵：掛載剛剛手動建立的多資料庫初始化 ConfigMap
  initdb:
    configMap: "postgres-init-sql"

  # 資源與限制微調：建議幫本地輕量測試環境加上基礎資源請求，防止資料庫搶資源被系統 OOM Kill
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  # 為了以後的 HA / Replica 實驗，開啟持久化儲存
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: "local-path" # K3s 內建的本地硬碟驅動