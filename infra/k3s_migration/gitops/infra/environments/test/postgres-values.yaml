global:
  postgresql:
    auth:
      existingSecret: "postgres-custom-auth"
      secretKeys:
        adminPasswordKey: "postgres-password"
        userPasswordKey: "password"

primary:
  # 掛載剛剛手動建立的多資料庫初始化 ConfigMap
  extraVolumes:
    - name: custom-init-scripts
      configMap:
        name: postgres-init-configmap

  extraVolumeMounts:
    - name: custom-init-scripts
      mountPath: /docker-entrypoint-initdb.d/init.sql
      subPath: init.sql

#  pgHbaConfiguration: |
#    local   all             all                                     trust
#    host    all             all             127.0.0.1/32            scram-sha-256
#    host    all             all             ::1/128                 scram-sha-256
#    host    all             all             10.42.0.0/16            scram-sha-256
#    host    all             all             all                     scram-sha-256

  # 資源與限制微調：建議幫本地輕量測試環境加上基礎資源請求，防止資料庫搶資源被系統 OOM Kill
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  # 為了以後的 HA / Replica 實驗，開啟持久化儲存
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: "local-path" # K3s 內建的本地硬碟驅動
    mountPath: /bitnami/postgresql
    subPath: "v2-data"