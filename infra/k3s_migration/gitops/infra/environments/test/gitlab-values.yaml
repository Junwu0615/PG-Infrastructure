# gitops/infra/environments/test/gitlab-values.yaml
# 適用於 GitLab Chart v9.x (GitLab 16.x)

global:
  hosts:
    domain: k3s.local
    https: false

  ingress:
    configureCertmanager: false
    provider: traefik
    class: "traefik"

  email:
    from: admin@k3s.local
    display_name: GitLab

  # ==========================================
  # 外部資料庫精準對接 (已確認位於 infra-tools)
  # ==========================================
  psql:
    host: postgres-infra-postgresql.infra-data.svc.cluster.local
    port: 5432
    database: gitlabhq_production
    username: gitlab
    password:
      secret: gitlab-postgres-pass # 讀取建立 Secret
      key: password

  redis:
    password:
      secret: gitlab-redis-pass
      key: secret

  minio:
    enabled: true
    credentials:
      secret: gitlab-minio-secret


affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: service-type
          operator: In
          values:
            - infra-tools

# ==========================================
# [關閉/調整] 內建微型 [服務/資料庫]
# ==========================================
gitlab-runner:
  install: false

# 使用既有 DB 而非獨立啟一個
postgresql:
  install: false

# 調整內建 Redis 的資源（如果你沒用外部 Redis）
redis:
  install: true
  master:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi

# 調整 GitLab 主要 Web 服務的資源（最吃資源的地方）
gitlab:
  webservice:
    minReplicas: 1 # 預設是 2，改成 1 節省一半資源
    maxReplicas: 2
    resources:
      requests:
        cpu: 200m   # 從預設的 4G/2G 砍到基礎運作量
        memory: 1.5Gi # GitLab Rails 框架最低限度建議 1.5G ~ 2G
      limits:
        cpu: 1000m
        memory: 3Gi

  # 調整後台非同步任務的資源
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 600Mi
      limits:
        cpu: 500m
        memory: 1.5Gi

  # 調整 Git 儲存庫核心服務
  gitaly:
    resources:
      requests:
        cpu: 100m
        memory: 500Mi
      limits:
        cpu: 500m
        memory: 1.5Gi

  gitlab-shell:
    ingress:
      enabled: false
    service:
      type: ClusterIP

# 關閉 Container Registry 節省資源
registry:
  enabled: false

certmanager:
  enabled: false

nginx-ingress:
  enabled: false

prometheus:
  enabled: false

# 不需要 GitLab Kubernetes 代理服務 (Agent Server)
gitlab-kas:
  enabled: false

kas:
  enabled: false

# 不產生 tls 區塊
ingress:
  tls:
    enabled: false