# terraform/cloud-config.cfg

system_info:
  default_user:
    name: debian

users:
  - name: debian
    ssh_authorized_keys:
      - ${ssh_public_key}
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/bash

growpart:
  mode: auto
  devices: ['/']

runcmd:
  - apt-get update
  - apt-get install -y qemu-guest-agent
  - systemctl start qemu-guest-agent