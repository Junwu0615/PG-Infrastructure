# ansible/hosts.ini

[k3s]
localhost  ansible_connection=local

[k3s:vars]
ansible_user=master
ansible_ssh_private_key_file=~/.ssh/id_rsa  # 確保 SSH key 已發送到各機

[k3s_master]
master-node ansible_host=192.168.0.17 ansible_user=master

[k3s_workers]
worker1 ansible_host=192.168.0.18 ansible_user=master
worker2 ansible_host=192.168.0.19 ansible_user=master
worker3 ansible_host=192.168.0.20 ansible_user=master

[k3s_cluster:children]
k3s_master
k3s_workers