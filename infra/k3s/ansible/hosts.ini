# ansible/hosts.ini

[master]
master-node ansible_host=192.168.0.17

[workers]
worker1 ansible_host=192.168.0.18
worker2 ansible_host=192.168.0.19
worker3 ansible_host=192.168.0.20

# 定義一個包含所有 VM 的群組
[k3s_cluster:children]
master
workers

[k3s_cluster:vars]
ansible_user=master
ansible_ssh_private_key_file=~/.ssh/id_rsa # 先確保 SSH key 已發送到各機