# ansible/k3s-setup.ini

---
- name: K3s Cluster Environment Preparation
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: 1. 更新系統套件
      apt:
        update_cache: yes
        upgrade: dist

    - name: 2. 安裝常用工具
      apt:
        name:
          - curl
          - git
          - nfs-common
          - htop
        state: present

    - name: 3. 關閉 Swap (K8s 必要)
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab

    - name: 4. 設定時區為 Asia/Taipei
      timezone:
        name: Asia/Taipei

- name: Master Node Configuration
  hosts: k3s_master
  become: yes
  tasks:
    - name: 確保 6443 埠開放
      ufw:
        rule: allow
        port: 6443
        proto: tcp

- name: Worker Nodes Preparation
  hosts: k3s_workers
  become: yes
  tasks:
    - name: 確保 Flannel 網路埠開放 (UDP 8472)
      ufw:
        rule: allow
        port: 8472
        proto: udp