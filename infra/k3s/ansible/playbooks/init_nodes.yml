# ansible/playbooks/init_nodes.yml

---
- name: Prepare Nodes
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Disable Swap
      shell: |
        swapoff -a
        sed -i '/swap/d' /etc/fstab
      when: ansible_swaptotal_mb > 0

    - name: Enable Kernel Modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay

    - name: Enable IPv4 Forwarding
      sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
      loop:
        - net.ipv4.ip_forward
        - net.bridge.bridge-nf-call-iptables