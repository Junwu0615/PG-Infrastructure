apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: app-ingress

spec:
  ingressClassName: nginx

  rules:
    - host: portainer.k8s.local
      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: portainer-service
                port:
                  number: 9000