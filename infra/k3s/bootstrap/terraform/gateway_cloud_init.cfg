#cloud-config

hostname: ${hostname}
manage_etc_hosts: true

users:
  - name: ${vm_user}
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_public_key}

ssh_pwauth: false
package_update: true
package_upgrade: false

packages:
  - qemu-guest-agent
  - curl
  - vim
  - nginx

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - systemctl enable nginx
  - systemctl start nginx