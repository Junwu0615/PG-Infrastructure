# ansible/playbooks/deploy_k3s.yml

---
- name: Install or Check K3s Server
  hosts: masters
  become: yes
  tasks:
    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_installed

    - name: Install K3s on First Node ( Only if not present )
      shell: curl -sfL https://get.k3s.io | sh -s - server --cluster-init
      when: not k3s_installed.stat.exists

    - name: Get Existing Node Token
      command: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      changed_when: false


- name: Install K3s Agents
  hosts: agents
  become: yes
  vars:
    server_ip: "{{ hostvars[groups['masters'][0]]['ansible_host'] | default(groups['masters'][0]) }}"
    token: "{{ hostvars[groups['masters'][0]]['k3s_token']['stdout'] }}"
  tasks:
    - name: Check if K3s Agent is already installed
      stat:
        path: /etc/systemd/system/k3s-agent.service
      register: agent_installed

    - name: Join Cluster ( Only new nodes )
      shell: "curl -sfL https://get.k3s.io | K3S_URL=https://{{ server_ip }}:6443 K3S_TOKEN={{ token }} sh -s - agent"
      when: not agent_installed.stat.exists


- name: Setup local kubectl access
  hosts: masters
  become: yes
  tasks:
    - name: Wait for K3s config
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 60

    - name: Fetch K3s config
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ~/.kube/config-k3s
        flat: yes

    - name: Fix Kubeconfig IP
      delegate_to: localhost
      become: no
      replace:
        path: ~/.kube/config-k3s
        regexp: 'server: https://.*:6443'
        replace: "server: https://{{ inventory_hostname }}:6443"