# helm/app-stack/templates/portainer/portainer-service.yaml

apiVersion: v1
kind: Service
metadata:
  name: portainer-service
spec:
  type: NodePort
  selector:
    app: portainer
  ports:
    - name: http
      protocol: TCP
      port: 9000
      targetPort: 9000
      nodePort: 30777 # 你可以透過 http://<minikube-ip>:30777 存取
    - name: https
      protocol: TCP
      port: 9443
      targetPort: 9443
      nodePort: 30778