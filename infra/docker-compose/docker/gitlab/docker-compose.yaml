services:
  gitlab:
    image: gitlab/gitlab-ce:${GITLAB_VERSION:-latest}
    ports:
      - '8090:80'
      - '443:443'
      - '2222:22'
    env_file:
      - .env
    environment: # 告訴 GitLab UI 顯示正確的 SSH 複製連結
      GITLAB_OMNIBUS_CONFIG: |
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
    volumes:
      - './data:/var/opt/gitlab'
      - './logs:/var/log/gitlab'
      - './config:/etc/gitlab'
    shm_size: '512mb'
    hostname: ${GITLAB_HOSTNAME}
    privileged: true
    restart: unless-stopped