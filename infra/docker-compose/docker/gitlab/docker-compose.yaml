services:
  gitlab:
    image: gitlab/gitlab-ce:${GITLAB_VERSION:-latest}
    ports:
      - '8090:80'
      - '443:443'
      - '22:22'
    env_file:
      - .env
    volumes:
      - './data:/var/opt/gitlab'
      - './logs:/var/log/gitlab'
      - './config:/etc/gitlab'
    shm_size: '512mb'
    hostname: ${GITLAB_HOSTNAME}
    privileged: true
    restart: unless-stopped