services:
  registry:
    image: registry:${REGISTRY_VERSION:-latest}
    ports:
      - '5100:5000'
    env_file:
      - .env
    volumes:
      - registry_data:/var/lib/registry/docker/registry
    mem_limit: '512mb'
    restart: unless-stopped

  registry-ui:
    image: joxit/docker-registry-ui:${REGISTRY_UI_VERSION:-latest}
    ports:
      - '8085:80'
    environment:
      - REGISTRY_TITLE=My Private Registry
      - REGISTRY_URL=http://registry:5100
      - SINGLE_REGISTRY=true
    depends_on:
      - registry
    restart: unless-stopped


volumes:
  registry_data: